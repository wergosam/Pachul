<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <!-- Background gradient: clear bright blue -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6ec3ff"/>
      <stop offset="100%" style="stop-color:#2f8fe0"/>
    </linearGradient>
    <!-- Box top face gradient -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bfe4ff"/>
      <stop offset="100%" style="stop-color:#7cc4ff"/>
    </linearGradient>
    <!-- Box left face gradient -->
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4fa3e8"/>
      <stop offset="100%" style="stop-color:#68b4f0"/>
    </linearGradient>
    <!-- Box right face gradient -->
    <linearGradient id="rightFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2a72c4"/>
      <stop offset="100%" style="stop-color:#1f5fa8"/>
    </linearGradient>
    <!-- Arrow/update accent -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#dff2ff"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadow" x="-10%" y="-5%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0a3d6b" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Subtle grid dots -->
  <g opacity="0.14" fill="#ffffff">
    <circle cx="20" cy="20" r="1.5"/>
    <circle cx="40" cy="20" r="1.5"/>
    <circle cx="60" cy="20" r="1.5"/>
    <circle cx="80" cy="20" r="1.5"/>
    <circle cx="100" cy="20" r="1.5"/>
    <circle cx="20" cy="40" r="1.5"/>
    <circle cx="100" cy="40" r="1.5"/>
    <circle cx="20" cy="60" r="1.5"/>
    <circle cx="100" cy="60" r="1.5"/>
    <circle cx="20" cy="80" r="1.5"/>
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="20" cy="100" r="1.5"/>
    <circle cx="40" cy="100" r="1.5"/>
    <circle cx="60" cy="100" r="1.5"/>
    <circle cx="80" cy="100" r="1.5"/>
    <circle cx="100" cy="100" r="1.5"/>
  </g>

  <!-- ── 3D Package box ─────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <!-- Left face -->
    <polygon points="22,58 64,80 64,108 22,86" fill="url(#leftFace)"/>
    <!-- Right face -->
    <polygon points="64,80 106,58 106,86 64,108" fill="url(#rightFace)"/>
    <!-- Top face -->
    <polygon points="22,58 64,36 106,58 64,80" fill="url(#topFace)"/>
  </g>

  <!-- Edge lines for crispness -->
  <polygon points="22,58 64,36 106,58 64,80" fill="none" stroke="#eaf6ff" stroke-width="0.8" opacity="0.6"/>
  <line x1="64" y1="80" x2="64" y2="108" stroke="#1f5fa8" stroke-width="0.8" opacity="0.5"/>

  <!-- Top face center tape / stripe -->
  <polygon points="44,47 64,36 84,47 64,58" fill="#eaf6ff" opacity="0.4"/>

  <!-- ── Circular update arrow badge (top-right) ───────────── -->
  <circle cx="93" cy="35" r="18" fill="#1f5fa8" opacity="0.9"/>
  <circle cx="93" cy="35" r="16" fill="none" stroke="url(#arrowGrad)" stroke-width="2.5"/>

  <!-- Refresh / update arrows -->
  <g filter="url(#glow)" fill="url(#arrowGrad)">
    <!-- Top arc arrow (clockwise) -->
    <path d="M 86,29 A 9,9 0 0 1 100,29" fill="none" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="100,29 103,24 105,31" fill="url(#arrowGrad)"/>
    <!-- Bottom arc arrow (clockwise) -->
    <path d="M 100,41 A 9,9 0 0 1 86,41" fill="none" stroke="url(#arrowGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <polygon points="86,41 83,46 81,39" fill="url(#arrowGrad)"/>
  </g>

  <!-- Small sparkle dots on top face -->
  <circle cx="57" cy="55" r="1.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="64" cy="51" r="1.2" fill="#ffffff" opacity="0.5"/>
  <circle cx="71" cy="56" r="1.5" fill="#ffffff" opacity="0.6"/>
</svg>
